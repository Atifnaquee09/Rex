<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rex — Command Deck</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 8px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .col-drop.drag-over { outline: 2px dashed #6366f1; outline-offset: -2px; background: #6366f10d; }
    .card { cursor: grab; }
    .card:active { cursor: grabbing; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
  <div class="max-w-[1600px] mx-auto p-6">
    <header class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-lg bg-gradient-to-br from-indigo-500 to-fuchsia-600 grid place-items-center font-black text-white">R</div>
        <div>
          <h1 class="text-xl font-bold text-white leading-none">Rex — Command Deck</h1>
          <p class="text-xs text-zinc-500 mt-1">Autonomous Senior Engineer · ticket board</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <nav class="flex gap-2 text-sm">
          <a href="/" class="px-3 py-1.5 rounded-lg bg-indigo-600 text-white">Board</a>
          <a href="/scripts.html" class="px-3 py-1.5 rounded-lg bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-zinc-300">Shell Scripts</a>
          <a href="/settings.html" class="px-3 py-1.5 rounded-lg bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-zinc-300">Settings</a>
        </nav>
        <div class="text-right">
          <div class="text-xl font-bold text-emerald-400 mono" id="stat-cost">$0.0000</div>
          <div class="text-[10px] text-zinc-500" id="stat-tokens">0 tokens · 0 runs</div>
        </div>
        <button id="new-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg px-4 py-2">+ Create</button>
      </div>
    </header>

    <!-- Board -->
    <div id="board" class="grid grid-cols-5 gap-3 min-h-[70vh]"></div>
  </div>

  <!-- Create modal -->
  <div id="create-modal" class="hidden fixed inset-0 bg-black/60 grid place-items-center z-40 p-4">
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 w-full max-w-lg">
      <h2 class="text-base font-semibold text-white mb-3">New ticket</h2>
      <input id="c-title" placeholder="Title" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm mb-2 outline-none focus:border-indigo-500" />
      <textarea id="c-desc" rows="3" placeholder="Description / acceptance criteria" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm mb-2 outline-none focus:border-indigo-500"></textarea>
      <div class="grid grid-cols-3 gap-2 mb-2">
        <select id="c-type" class="bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-2 text-sm">
          <option value="task">Task</option><option value="bug">Bug</option><option value="feature">Feature</option>
        </select>
        <select id="c-priority" class="bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-2 text-sm">
          <option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="urgent">Urgent</option>
        </select>
        <input id="c-assignee" placeholder="Assignee" class="bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-2 text-sm outline-none focus:border-indigo-500" />
      </div>
      <label class="flex items-center gap-2 text-xs text-zinc-400 mb-3">
        <input type="checkbox" id="c-run" class="accent-indigo-500" /> Run with Rex immediately
      </label>
      <div class="flex justify-end gap-2">
        <button id="c-cancel" class="text-sm text-zinc-400 px-3 py-2">Cancel</button>
        <button id="c-save" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg px-4 py-2">Create</button>
      </div>
    </div>
  </div>

  <!-- Detail drawer -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/60 z-40 flex justify-end">
    <div class="bg-zinc-900 border-l border-zinc-800 w-full max-w-2xl h-full overflow-y-auto scroll p-5">
      <div class="flex items-start justify-between mb-3">
        <div>
          <h2 id="d-title" class="text-base font-semibold text-white"></h2>
          <p id="d-meta" class="text-xs text-zinc-500 mt-1"></p>
        </div>
        <button id="d-close" class="text-zinc-400 hover:text-white text-xl leading-none">&times;</button>
      </div>
      <div class="flex flex-wrap gap-2 mb-3" id="d-badges"></div>
      <p id="d-desc" class="text-sm text-zinc-400 mb-3 whitespace-pre-wrap"></p>
      <div class="flex gap-2 mb-3">
        <button id="d-run" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold rounded-lg px-3 py-1.5">▶ Run with Rex</button>
        <select id="d-status" class="bg-zinc-950 border border-zinc-800 rounded-lg px-2 py-1.5 text-xs"></select>
      </div>
      <div id="d-run-info" class="text-xs text-zinc-400 mono mb-2"></div>
      <div class="text-[11px] uppercase tracking-wide text-zinc-500 mb-2">Live activity</div>
      <div id="d-log" class="bg-zinc-950 border border-zinc-800 rounded-lg p-3 h-[55vh] overflow-y-auto scroll space-y-2 text-xs"></div>
    </div>
  </div>

  <script>
    const COLUMNS = [
      { key: "backlog", label: "Backlog" },
      { key: "todo", label: "To Do" },
      { key: "in_progress", label: "In Progress" },
      { key: "in_review", label: "In Review" },
      { key: "done", label: "Done" },
    ];
    const PRIO = { urgent: "bg-rose-500/20 text-rose-300", high: "bg-orange-500/20 text-orange-300", medium: "bg-zinc-700 text-zinc-300", low: "bg-sky-500/20 text-sky-300" };
    const TYPE = { bug: "bg-rose-500/20 text-rose-300", feature: "bg-violet-500/20 text-violet-300", task: "bg-zinc-700 text-zinc-300" };
    const EVENT_COLORS = { assistant: "text-zinc-300", tool: "text-sky-400", system: "text-zinc-500", result: "text-emerald-400", error: "text-rose-400", thinking: "text-fuchsia-400" };

    let tickets = [];
    let selectedId = null, lastEventId = 0, dragId = null;
    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    async function loadStats() {
      const s = await fetch("/api/stats").then((r) => r.json());
      document.getElementById("stat-cost").textContent = "$" + Number(s.totals.cost_usd).toFixed(4);
      document.getElementById("stat-tokens").textContent =
        `${Number(s.totals.input_tokens + s.totals.output_tokens).toLocaleString()} tokens · ${s.totals.runs} runs`;
    }

    async function loadBoard() {
      tickets = await fetch("/api/tickets").then((r) => r.json());
      const board = document.getElementById("board");
      board.innerHTML = COLUMNS.map((col) => {
        const items = tickets.filter((t) => t.status === col.key);
        return `
          <div class="flex flex-col">
            <div class="flex items-center justify-between px-1 mb-2">
              <span class="text-xs font-semibold text-zinc-300 uppercase tracking-wide">${col.label}</span>
              <span class="text-[10px] text-zinc-600">${items.length}</span>
            </div>
            <div class="col-drop flex-1 space-y-2 rounded-lg p-1.5 bg-zinc-900/40 border border-zinc-800/60 min-h-[60vh]" data-status="${col.key}">
              ${items.map(card).join("")}
            </div>
          </div>`;
      }).join("");

      board.querySelectorAll(".card").forEach((el) => {
        el.addEventListener("dragstart", () => { dragId = Number(el.dataset.id); });
        el.addEventListener("click", (e) => { if (!e.target.dataset.run) openDetail(Number(el.dataset.id)); });
      });
      board.querySelectorAll("[data-run]").forEach((b) =>
        b.addEventListener("click", async (e) => { e.stopPropagation(); await runRex(Number(b.dataset.run)); }));
      board.querySelectorAll(".col-drop").forEach((col) => {
        col.addEventListener("dragover", (e) => { e.preventDefault(); col.classList.add("drag-over"); });
        col.addEventListener("dragleave", () => col.classList.remove("drag-over"));
        col.addEventListener("drop", async (e) => {
          e.preventDefault(); col.classList.remove("drag-over");
          if (dragId == null) return;
          const status = col.dataset.status;
          await fetch(`/api/tickets/${dragId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status }) });
          dragId = null; loadBoard();
        });
      });
    }

    function card(t) {
      const running = t.status === "in_progress";
      return `
        <div draggable="true" data-id="${t.id}" class="card bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-lg p-2.5 ${running ? "ring-1 ring-indigo-500/40" : ""}">
          <div class="flex items-center gap-1.5 mb-1.5">
            <span class="text-[10px] px-1.5 py-0.5 rounded ${TYPE[t.type] || TYPE.task}">${t.type}</span>
            <span class="text-[10px] px-1.5 py-0.5 rounded ${PRIO[t.priority] || PRIO.medium}">${t.priority}</span>
            ${t.queued ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300">queued</span>' : ""}
            ${running ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-indigo-500/20 text-indigo-300 animate-pulse">working</span>' : ""}
          </div>
          <div class="text-sm text-white leading-snug mb-1.5">${esc(t.title)}</div>
          <div class="flex items-center justify-between">
            <span class="text-[10px] text-zinc-600">#${t.id}${t.assignee ? " · " + esc(t.assignee) : ""}</span>
            ${["done", "in_progress"].includes(t.status) ? "" : `<button data-run="${t.id}" class="text-[10px] text-emerald-400 hover:text-emerald-300">▶ Rex</button>`}
          </div>
        </div>`;
    }

    async function runRex(id) {
      await fetch(`/api/tickets/${id}/run`, { method: "POST" });
      loadBoard();
    }

    async function openDetail(id) {
      if (id !== selectedId) { selectedId = id; lastEventId = 0; document.getElementById("d-log").innerHTML = ""; }
      document.getElementById("detail-modal").classList.remove("hidden");
      await refreshDetail();
    }
    function closeDetail() { document.getElementById("detail-modal").classList.add("hidden"); selectedId = null; }

    async function refreshDetail() {
      if (selectedId == null) return;
      const data = await fetch(`/api/tickets/${selectedId}?afterEvent=${lastEventId}`).then((r) => r.json());
      const t = data.ticket;
      document.getElementById("d-title").textContent = `#${t.id} ${t.title}`;
      document.getElementById("d-meta").textContent = `${t.source} · created ${t.created_at} · by ${t.created_by}`;
      document.getElementById("d-desc").textContent = t.description || "";
      document.getElementById("d-badges").innerHTML =
        `<span class="text-[11px] px-2 py-0.5 rounded ${TYPE[t.type]}">${t.type}</span>
         <span class="text-[11px] px-2 py-0.5 rounded ${PRIO[t.priority]}">${t.priority}</span>
         ${t.assignee ? `<span class="text-[11px] px-2 py-0.5 rounded bg-zinc-700 text-zinc-300">@ ${esc(t.assignee)}</span>` : ""}`;
      const sel = document.getElementById("d-status");
      sel.innerHTML = COLUMNS.map((c) => `<option value="${c.key}" ${c.key === t.status ? "selected" : ""}>${c.label}</option>`).join("");
      const run = data.runs[data.runs.length - 1];
      document.getElementById("d-run-info").textContent = run
        ? `run #${run.id} · ${run.model} · in ${run.input_tokens} / out ${run.output_tokens} · $${Number(run.cost_usd).toFixed(4)} · ${run.num_turns} turns`
        : "no run yet";
      const log = document.getElementById("d-log");
      for (const ev of data.events) {
        lastEventId = Math.max(lastEventId, ev.id);
        const row = document.createElement("div");
        row.className = EVENT_COLORS[ev.type] || "text-zinc-300";
        row.innerHTML = `<span class="text-zinc-600 mono">[${ev.type}]</span> <span class="whitespace-pre-wrap">${esc(ev.content)}</span>`;
        log.appendChild(row);
      }
      if (data.events.length) log.scrollTop = log.scrollHeight;
    }

    // Detail controls
    document.getElementById("d-close").addEventListener("click", closeDetail);
    document.getElementById("d-run").addEventListener("click", async () => { if (selectedId != null) { await runRex(selectedId); refreshDetail(); } });
    document.getElementById("d-status").addEventListener("change", async (e) => {
      if (selectedId == null) return;
      await fetch(`/api/tickets/${selectedId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status: e.target.value }) });
      loadBoard();
    });

    // Create modal
    const cm = document.getElementById("create-modal");
    document.getElementById("new-btn").addEventListener("click", () => cm.classList.remove("hidden"));
    document.getElementById("c-cancel").addEventListener("click", () => cm.classList.add("hidden"));
    document.getElementById("c-save").addEventListener("click", async () => {
      const title = document.getElementById("c-title").value.trim();
      if (!title) return;
      await fetch("/api/tickets", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title,
          description: document.getElementById("c-desc").value.trim(),
          type: document.getElementById("c-type").value,
          priority: document.getElementById("c-priority").value,
          assignee: document.getElementById("c-assignee").value.trim(),
          assign: document.getElementById("c-run").checked,
        }),
      });
      ["c-title", "c-desc", "c-assignee"].forEach((id) => (document.getElementById(id).value = ""));
      document.getElementById("c-run").checked = false;
      cm.classList.add("hidden");
      loadBoard();
    });

    function loop() { loadStats(); loadBoard(); if (selectedId != null) refreshDetail(); }
    loadStats(); loadBoard();
    setInterval(loop, 3000);
  </script>
</body>
</html>
